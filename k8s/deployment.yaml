apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapcart-deployment
  namespace: snapcart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: snapcart
  template:
    metadata:
      labels:
        app: snapcart
    spec:
      containers:
      - name: snapcart
        image: snapcart:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
